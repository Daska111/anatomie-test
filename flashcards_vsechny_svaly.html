<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards – Svaly</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #EEF2FF 0%, #FAF0FB 50%, #FFF0F6 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-size: 1.8rem; font-weight: 700;
    background: linear-gradient(90deg, #534AB7, #D4537E);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  header p { font-size: 14px; color: #7F77DD; }

  .filter {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 20px; max-width: 600px;
  }
  .filter button {
    padding: 6px 14px; border-radius: 99px;
    border: 1.5px solid #AFA9EC; background: white;
    color: #534AB7; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .filter button.active {
    background: linear-gradient(90deg, #7F77DD, #D4537E);
    border-color: transparent; color: white;
  }
  .filter button:hover:not(.active) { background: #EEF2FF; }

  .progress-bar-wrap { width: 100%; max-width: 480px; margin-bottom: 8px; }
  .progress-track { height: 6px; background: rgba(127,119,221,0.2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7F77DD, #D4537E); border-radius: 99px; transition: width 0.3s ease; }
  .progress-label { font-size: 12px; color: #7F77DD; text-align: center; margin-top: 5px; margin-bottom: 16px; }

  .stats { display: flex; gap: 10px; width: 100%; max-width: 480px; margin-bottom: 20px; }
  .stat { flex: 1; border-radius: 12px; padding: 10px; text-align: center; }
  .stat.total { background: #EEEDFE; }
  .stat.yes { background: #E1F5EE; }
  .stat.no { background: #FAECE7; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat.total .stat-num { color: #3C3489; }
  .stat.yes .stat-num { color: #085041; }
  .stat.no .stat-num { color: #712B13; }
  .stat-lbl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat.total .stat-lbl { color: #534AB7; }
  .stat.yes .stat-lbl { color: #0F6E56; }
  .stat.no .stat-lbl { color: #993C1D; }

  .card-area { width: 100%; max-width: 480px; perspective: 1200px; margin-bottom: 20px; }
  .card {
    width: 100%; min-height: 280px; position: relative;
    transform-style: preserve-3d; transition: transform 0.5s ease; cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; width: 100%; min-height: 280px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 20px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px 24px; text-align: center;
  }
  .card-front { background: white; border: 1.5px solid rgba(127,119,221,0.3); }
  .card-back { background: white; border: 1.5px solid rgba(212,83,126,0.3); transform: rotateY(180deg); }

  .card-tag {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.07em; padding: 3px 10px; border-radius: 99px; margin-bottom: 14px;
  }
  .tag-hlava { background: #EEEDFE; color: #534AB7; }
  .tag-krk { background: #E1F5EE; color: #0F6E56; }
  .tag-hrudnik { background: #FAECE7; color: #993C1D; }
  .tag-bricho { background: #FAEEDA; color: #633806; }
  .tag-zada { background: #FBEAF0; color: #72243E; }
  .tag-horni { background: #E6F1FB; color: #185FA5; }
  .tag-dolni { background: #EAF3DE; color: #27500A; }

  .card-name { font-size: 20px; font-weight: 700; color: #26215C; margin-bottom: 6px; line-height: 1.3; }
  .card-hint { font-size: 13px; color: #AFA9EC; margin-top: 14px; }

  .card-latin { font-size: 14px; font-style: italic; color: #D4537E; margin-bottom: 14px; font-weight: 500; }
  .back-rows { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .back-row { display: flex; gap: 8px; align-items: flex-start; text-align: left; }
  .back-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em; padding: 2px 8px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .lbl-z { background: #EEEDFE; color: #3C3489; }
  .lbl-u { background: #E1F5EE; color: #085041; }
  .lbl-f { background: #FBEAF0; color: #72243E; }
  .back-val { font-size: 13px; color: #26215C; line-height: 1.5; }

  .result-row { display: flex; gap: 10px; width: 100%; max-width: 480px; display: none; margin-bottom: 16px; }
  .result-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .result-btn.yes { background: #E1F5EE; color: #085041; border: 1.5px solid #5DCAA5; }
  .result-btn.no { background: #FAECE7; color: #712B13; border: 1.5px solid #F0997B; }
  .result-btn:hover { opacity: 0.8; }

  .nav { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
  .nav button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1.5px solid #AFA9EC; background: white;
    color: #534AB7; font-size: 20px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .nav button:hover { background: #EEF2FF; border-color: #7F77DD; }
  .nav button:disabled { opacity: 0.3; cursor: default; }
  .btn-flip {
    padding: 12px 32px; border-radius: 99px;
    background: linear-gradient(90deg, #7F77DD, #D4537E);
    border: none; color: white; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-flip:hover { opacity: 0.9; }

  .done {
    background: white; border-radius: 20px; padding: 36px 28px;
    text-align: center; max-width: 480px; width: 100%;
    border: 1.5px solid rgba(127,119,221,0.3); display: none;
  }
  .done h2 {
    font-size: 1.4rem; font-weight: 700;
    background: linear-gradient(90deg, #534AB7, #D4537E);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .done p { font-size: 14px; color: #7F77DD; margin-bottom: 20px; }
  .btn-restart {
    padding: 12px 32px; border-radius: 99px;
    background: linear-gradient(90deg, #7F77DD, #D4537E);
    border: none; color: white; font-size: 15px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>Svaly – flashcards</h1>
  <p>Klikni na kartičku pro otočení · přesně dle učebnice</p>
</header>

<div class="filter">
  <button class="active" onclick="setFilter('vse')">Vše</button>
  <button onclick="setFilter('hlava')">Hlava</button>
  <button onclick="setFilter('krk')">Krk</button>
  <button onclick="setFilter('hrudnik')">Hrudník</button>
  <button onclick="setFilter('bricho')">Břicho</button>
  <button onclick="setFilter('zada')">Záda</button>
  <button onclick="setFilter('horni')">Horní konč.</button>
  <button onclick="setFilter('dolni')">Dolní konč.</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0</div>
</div>

<div class="stats">
  <div class="stat total"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Celkem</div></div>
  <div class="stat yes"><div class="stat-num" id="statYes">0</div><div class="stat-lbl">Znám ✓</div></div>
  <div class="stat no"><div class="stat-num" id="statNo">0</div><div class="stat-lbl">Učím se ✗</div></div>
</div>

<div class="card-area">
  <div class="card" id="card" onclick="flipCard()">
    <div class="card-face card-front">
      <span class="card-tag" id="cardTag"></span>
      <div class="card-name" id="cardName"></div>
      <div class="card-hint">Klikni pro otočení</div>
    </div>
    <div class="card-face card-back">
      <span class="card-tag" id="cardTagBack"></span>
      <div class="card-latin" id="cardLatin"></div>
      <div class="back-rows" id="backRows"></div>
    </div>
  </div>
</div>

<div class="result-row" id="resultRow">
  <button class="result-btn no" onclick="answer(false)">✗ Ještě se učím</button>
  <button class="result-btn yes" onclick="answer(true)">✓ Znám</button>
</div>

<div class="nav">
  <button id="btnPrev" onclick="prevCard()">&#8592;</button>
  <button class="btn-flip" onclick="flipCard()">Otočit</button>
  <button id="btnNext" onclick="nextCard()">&#8594;</button>
</div>

<div class="done" id="doneScreen">
  <h2 id="doneTitle"></h2>
  <p id="doneText"></p>
  <button class="btn-restart" onclick="restart()">Znovu od začátku</button>
</div>

const SKUPINY = { hlava:'Svaly hlavy', krk:'Svaly krku', hrudnik:'Svaly hrudníku', bricho:'Břišní svaly', zada:'Zádové svaly', horni:'Svaly horní končetiny', dolni:'Svaly dolní končetiny' };
const TAGS = { hlava:'tag-hlava', krk:'tag-krk', hrudnik:'tag-hrudnik', bricho:'tag-bricho', zada:'tag-zada', horni:'tag-horni', dolni:'tag-dolni' };

let cards = [], current = 0, isFlipped = false;
let countYes = 0, countNo = 0, filter = 'vse', answered = [];

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter button').forEach(b => {
    const map = ['vse','hlava','krk','hrudnik','bricho','zada','horni','dolni'];
    b.classList.toggle('active', map[Array.from(document.querySelectorAll('.filter button')).indexOf(b)] === f);
  });
  restart();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function restart() {
  cards = shuffle([...ALL_CARDS].filter(c => filter === 'vse' || c.s === filter));
  current = 0; isFlipped = false; countYes = 0; countNo = 0;
  answered = new Array(cards.length).fill(null);
  document.getElementById('doneScreen').style.display = 'none';
  document.getElementById('card').style.display = '';
  document.getElementById('resultRow').style.display = 'none';
  document.querySelector('.nav').style.display = '';
  showCard(); updateStats();
}

function showCard() {
  if (!cards.length) return;
  const c = cards[current];
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');

  const tagLabel = SKUPINY[c.s] || c.s;
  const tagCls = 'card-tag ' + (TAGS[c.s] || '');

  document.getElementById('cardTag').textContent = tagLabel;
  document.getElementById('cardTag').className = tagCls;
  document.getElementById('cardTagBack').textContent = tagLabel;
  document.getElementById('cardTagBack').className = tagCls;
  document.getElementById('cardName').textContent = c.n;
  document.getElementById('cardLatin').textContent = c.l;

  const backRows = document.getElementById('backRows');
  backRows.innerHTML = '';
  c.polozky.forEach(p => {
    const row = document.createElement('div');
    row.className = 'back-row';
    const labels = {z:'Začátek', u:'Úpon', f:'Funkce'};
    const lblCls = {z:'lbl-z', u:'lbl-u', f:'lbl-f'};
    row.innerHTML = `<span class="back-label ${lblCls[p.t]}">${labels[p.t]}</span><span class="back-val">${p.v}</span>`;
    backRows.appendChild(row);
  });

  document.getElementById('resultRow').style.display = 'none';
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === cards.length - 1;
  updateProgress();
}

function updateProgress() {
  const done = answered.filter(a => a !== null).length;
  const pct = cards.length > 0 ? (done / cards.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + cards.length;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  if (isFlipped) document.getElementById('resultRow').style.display = 'flex';
}

function answer(yes) {
  if (answered[current] === null) {
    if (yes) countYes++; else countNo++;
    answered[current] = yes;
  }
  updateStats(); updateProgress();
  if (answered.filter(a => a !== null).length === cards.length) { showDone(); return; }
  let next = current + 1;
  while (next < cards.length && answered[next] !== null) next++;
  if (next >= cards.length) { next = 0; while (next < cards.length && answered[next] !== null) next++; }
  current = next; showCard();
}

function nextCard() { if (current < cards.length - 1) { current++; showCard(); } }
function prevCard() { if (current > 0) { current--; showCard(); } }

function updateStats() {
  document.getElementById('statTotal').textContent = cards.length;
  document.getElementById('statYes').textContent = countYes;
  document.getElementById('statNo').textContent = countNo;
}

function showDone() {
  document.getElementById('card').style.display = 'none';
  document.getElementById('resultRow').style.display = 'none';
  document.querySelector('.nav').style.display = 'none';
  const pct = Math.round(countYes / cards.length * 100);
  document.getElementById('doneScreen').style.display = 'block';
  document.getElementById('doneTitle').textContent = pct >= 80 ? '🎉 Výborně!' : pct >= 50 ? '💪 Dobrá práce!' : '📖 Ještě trochu procvičit!';
  document.getElementById('doneText').textContent = 'Znáš ' + countYes + ' z ' + cards.length + ' svalů (' + pct + '%). ' + (pct >= 80 ? 'Jsi připravená na zkoušku!' : 'Zkus to znovu, půjde to lépe!');
}
